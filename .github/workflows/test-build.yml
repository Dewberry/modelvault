name: Test & Build Binaries

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-${{ matrix.go-version }}-

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.out
        flags: unittests
      continue-on-error: true

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            suffix: linux-amd64
          - os: linux
            arch: arm64
            suffix: linux-arm64
          - os: darwin
            arch: amd64
            suffix: macos-amd64
          - os: darwin
            arch: arm64
            suffix: macos-arm64
          - os: windows
            arch: amd64
            suffix: windows-amd64.exe

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Build ${{ matrix.suffix }}
      env:
        GOOS: ${{ matrix.os }}
        GOARCH: ${{ matrix.arch }}
      run: |
        mkdir -p dist
        OUTPUT_NAME="dist/modelvault-${{ matrix.suffix }}"
        go build -o "$OUTPUT_NAME" ./cmd/modelvault

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: modelvault-${{ matrix.suffix }}
        path: dist/modelvault-${{ matrix.suffix }}
        retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Get Next Version
      id: version
      uses: actions/github-script@v7
      with:
        script: |
          try {
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });

            let lastVersion = 'v0.0.0';
            if (releases.data.length > 0) {
              lastVersion = releases.data[0].tag_name;
            }

            // Parse semantic version
            const match = lastVersion.match(/v(\d+)\.(\d+)\.(\d+)/);
            let major = 0, minor = 0, patch = 0;

            if (match) {
              major = parseInt(match[1]);
              minor = parseInt(match[2]);
              patch = parseInt(match[3]);
            }

            // Increment patch version
            patch++;
            const nextVersion = `v${major}.${minor}.${patch}`;

            core.setOutput('version', nextVersion);
            console.log('Latest version:', lastVersion);
            console.log('Next version:', nextVersion);
          } catch (error) {
            console.log('No releases found, starting with v0.1.0');
            core.setOutput('version', 'v0.1.0');
          }

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist

    - name: Organize artifacts
      run: |
        mkdir -p release
        find dist -type f -name "modelvault*" -exec mv {} release/ \;
        ls -la release/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.version }}
        files: release/*
        draft: false
        prerelease: false
        body: |
          Automated release - ${{ steps.version.outputs.version }}

          Built from commit: ${{ github.sha }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


